<div class="flex h-screen bg-gray-950 text-white overflow-hidden" style="position: relative; z-index: 1000;">
  <!-- Sidebar -->
  <aside
    class="bg-gray-900 border-r border-gray-800/60 flex-shrink-0 fixed inset-y-0 left-0 transform transition-all duration-300 z-40 md:relative md:translate-x-0 md:inset-auto md:static flex flex-col"
    [class.translate-x-0]="sidebarOpen"
    [class.-translate-x-full]="!sidebarOpen"
    [class.w-64]="!sidebarCollapsed"
    [class.w-20]="sidebarCollapsed">

    <!-- Logo area -->
    <div class="flex items-center h-16 px-5 border-b border-gray-800/60">
      <div class="flex items-center gap-3 min-w-0" *ngIf="!sidebarCollapsed">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </div>
        <span class="text-lg font-semibold text-white truncate">Admin Panel</span>
      </div>
      <button (click)="toggleSidebar()" class="md:hidden ml-auto text-gray-400 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
      <button (click)="toggleCollapse()" class="hidden md:block ml-auto text-gray-500 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path *ngIf="!sidebarCollapsed" stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
          <path *ngIf="sidebarCollapsed" stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      <p class="text-[11px] uppercase tracking-wider text-gray-500 font-semibold px-3 mb-2" *ngIf="!sidebarCollapsed">
        Secciones
      </p>

      <button *ngFor="let item of sidebarItems"
        (click)="selectSection(item.id)"
        [class]="'w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 group ' +
          (activeSection === item.id
            ? 'bg-indigo-600/20 text-indigo-300 border border-indigo-500/30'
            : 'text-gray-400 hover:text-white hover:bg-gray-800/60 border border-transparent')"
        [title]="item.label">

        <!-- Home icon -->
        <svg *ngIf="item.icon === 'home'" class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>

        <!-- Users icon -->
        <svg *ngIf="item.icon === 'users'" class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>

        <!-- Calendar icon -->
        <svg *ngIf="item.icon === 'calendar'" class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>

        <!-- Mail icon -->
        <svg *ngIf="item.icon === 'mail'" class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>

        <!-- Layout (Header/Footer) icon -->
        <svg *ngIf="item.icon === 'layout'" class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"/>
        </svg>

        <span *ngIf="!sidebarCollapsed" class="truncate">{{ item.label }}</span>
      </button>
    </nav>

    <!-- User / Logout -->
    <div class="p-3 border-t border-gray-800/60">
      <div class="flex items-center gap-3 px-3 py-2 mb-2" *ngIf="!sidebarCollapsed">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-xs font-bold flex-shrink-0">
          {{ currentUser?.username?.charAt(0)?.toUpperCase() || 'A' }}
        </div>
        <div class="min-w-0">
          <p class="text-sm font-medium text-gray-200 truncate">{{ currentUser?.username }}</p>
          <p class="text-xs text-gray-500 truncate">{{ currentUser?.role }}</p>
        </div>
      </div>
      <button (click)="logout()"
        class="w-full flex items-center justify-center gap-2 px-3 py-2 text-sm text-red-400 hover:text-red-300 hover:bg-red-900/20 rounded-lg transition-all"
        [title]="'Cerrar Sesion'">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        <span *ngIf="!sidebarCollapsed">Cerrar Sesion</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Top Bar -->
    <header class="bg-gray-900/80 backdrop-blur-sm border-b border-gray-800/60 h-14 flex items-center px-4 md:px-6 flex-shrink-0">
      <button (click)="toggleSidebar()" class="md:hidden mr-3 text-gray-400 hover:text-white transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

      <div class="flex-1 flex items-center gap-3">
        <h1 class="text-lg font-semibold text-white">{{ getActiveLabel() }}</h1>
        <span class="hidden sm:inline-block text-xs text-gray-500 bg-gray-800 px-2 py-0.5 rounded-md">
          EL VIVE IGLESIA
        </span>
      </div>

      <div class="flex items-center gap-3">
        <button (click)="saveAllSections()" [disabled]="isSaving"
          class="px-4 py-1.5 bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white text-sm font-medium rounded-lg transition-colors flex items-center gap-2">
          <svg *ngIf="!isSaving" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
          </svg>
          <svg *ngIf="isSaving" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          {{ isSaving ? 'Guardando...' : 'Guardar Todo' }}
        </button>
      </div>
    </header>

    <!-- Success Banner -->
    <div *ngIf="saveSuccess"
      class="bg-emerald-900/40 border-b border-emerald-700/30 text-emerald-300 px-6 py-2 text-sm text-center flex items-center justify-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
      Todos los cambios guardados en la base de datos
    </div>
    <!-- Error Banner -->
    <div *ngIf="saveError"
      class="bg-red-900/40 border-b border-red-700/30 text-red-300 px-6 py-2 text-sm text-center flex items-center justify-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.732-.833-2.5 0L4.268 16.5c-.77.833.192 2.5 1.732 2.5z"/>
      </svg>
      Hubo errores al guardar. Revisa la consola para mas detalles.
    </div>

    <!-- Content Area -->
    <main class="flex-1 overflow-auto">
      <div [hidden]="activeSection !== 'home'">
        <app-admin-home></app-admin-home>
      </div>
      <div [hidden]="activeSection !== 'layout'">
        <app-admin-layout></app-admin-layout>
      </div>
      <div [hidden]="activeSection !== 'ministries'">
        <app-admin-ministerios></app-admin-ministerios>
      </div>
      <div [hidden]="activeSection !== 'events'">
        <app-admin-dias-reunion></app-admin-dias-reunion>
      </div>
      <div [hidden]="activeSection !== 'contact'">
        <app-admin-contacto></app-admin-contacto>
      </div>
    </main>
  </div>

  <!-- Mobile Overlay -->
  <div *ngIf="sidebarOpen" (click)="toggleSidebar()"
    class="fixed inset-0 bg-black/60 backdrop-blur-sm md:hidden z-30">
  </div>
</div>
