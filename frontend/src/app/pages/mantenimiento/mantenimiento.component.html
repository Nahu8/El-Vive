<div class="mantenimiento-root" role="status" aria-live="polite">
  <div class="mantenimiento-bg" aria-hidden="true">
    <div class="mantenimiento-base"></div>
    <div class="mantenimiento-mesh"></div>
    <div class="mantenimiento-aurora"></div>
    <div class="mantenimiento-sweep"></div>
    <div class="mantenimiento-beam mantenimiento-beam--1"></div>
    <div class="mantenimiento-beam mantenimiento-beam--2"></div>
    <div class="mantenimiento-ring"></div>
    <div class="mantenimiento-orbit mantenimiento-orbit--1"></div>
    <div class="mantenimiento-orbit mantenimiento-orbit--2"></div>
    <div class="mantenimiento-orbit mantenimiento-orbit--3"></div>
    <div class="mantenimiento-orbit mantenimiento-orbit--4"></div>
    <div class="mantenimiento-grid"></div>
    <div class="mantenimiento-vignette"></div>
  </div>

  <div class="mantenimiento-content">
    <p class="mantenimiento-badge">
      <span class="mantenimiento-dot"></span>
      En mantenimiento
    </p>
    <h1 class="mantenimiento-title">{{ brandTitle }}</h1>
    <p class="mantenimiento-lead">
      Estamos terminando los contenidos para compartirlos con vos pronto.
    </p>
    <p class="mantenimiento-sub">
      Gracias por tu paciencia. Volvé más tarde o contactanos por los canales habituales de la iglesia.
    </p>
  </div>
</div>
