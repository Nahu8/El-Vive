<div class="fixed top-24 right-6 z-[60] p-3 -m-3 cursor-pointer select-none"
  (click)="toggle()"
  [attr.aria-label]="themeService.isDarkMode() ? 'Modo día' : 'Modo noche'"
  [title]="themeService.isDarkMode() ? 'Cambiar a modo día' : 'Cambiar a modo noche'"
  role="button"
  tabindex="0"
  (keydown.enter)="toggle()"
  (keydown.space)="toggle()">
  <button type="button" class="theme-toggle w-12 h-12 min-w-12 min-h-12 rounded-full flex items-center justify-center shadow-lg transition-all duration-300 hover:scale-110 active:scale-95 bg-gray-800 hover:bg-gray-700 border-2 border-gray-600 text-yellow-400 pointer-events-none"
    [class.text-indigo-600]="!themeService.isDarkMode()">
    <svg *ngIf="themeService.isDarkMode()" class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
    </svg>
    <svg *ngIf="!themeService.isDarkMode()" class="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
    </svg>
  </button>
</div>
