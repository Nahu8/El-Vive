<header class="fixed top-0 left-0 right-0 z-50 p-6" [class.is-scrolled]="isScrolled">
  <div class="container mx-auto flex justify-between items-center">
    <div class="text-2xl font-bold tracking-wide header-logo">
      <a routerLink="/" class="header-logo-link hover:opacity-80 transition-opacity inline-flex items-center">
        <div class="relative h-10 w-10 md:h-12 md:w-12 lg:h-16 lg:w-16 rounded-full overflow-hidden">
          <img [src]="currentIconUrl" alt="Logo" class="absolute inset-0 w-full h-full object-contain object-center transition-opacity duration-1000">
        </div>
      </a>
    </div>

    <nav class="hidden md:flex items-center gap-8">
      <a *ngFor="let link of navLinks" [routerLink]="link.path"
        routerLinkActive="header-nav-active"
        [routerLinkActiveOptions]="{ exact: link.path === '/' }"
        class="header-nav-link uppercase text-sm transition-colors">
        {{ link.label }}
      </a>
      <app-theme-toggle *ngIf="showThemeToggle"></app-theme-toggle>
    </nav>

    <button type="button"
      class="md:hidden header-menu-btn relative z-[60] w-10 h-10 flex items-center justify-center"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen"
      aria-label="Menú">
      <span class="hamburger" [class.is-open]="isMenuOpen">
        <span></span><span></span><span></span>
      </span>
    </button>
  </div>

  <div class="md:hidden sidebar-backdrop"
    [class.is-open]="isMenuOpen"
    (click)="toggleMenu()"
    aria-hidden="true"></div>

  <aside class="md:hidden sidebar-panel"
    [class.is-open]="isMenuOpen"
    [attr.aria-hidden]="!isMenuOpen">
    <nav class="flex flex-col p-8 pt-24 gap-5">
      <a *ngFor="let link of navLinks; let i = index" [routerLink]="link.path" (click)="toggleMenu()"
        routerLinkActive="header-nav-active-mobile"
        [routerLinkActiveOptions]="{ exact: link.path === '/' }"
        class="header-nav-link-mobile uppercase text-sm transition-colors sidebar-link"
        [style.transition-delay.ms]="isMenuOpen ? 80 + i * 50 : 0">
        {{ link.label }}
      </a>

      <div *ngIf="showThemeToggle" class="pt-4 sidebar-link"
        [style.transition-delay.ms]="isMenuOpen ? 80 + navLinks.length * 50 : 0">
        <app-theme-toggle *ngIf="showThemeToggle"></app-theme-toggle>
      </div>
    </nav>
  </aside>
</header>
